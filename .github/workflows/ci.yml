name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.runner }})
    strategy:
      matrix:
        runner:
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        run: swift test
